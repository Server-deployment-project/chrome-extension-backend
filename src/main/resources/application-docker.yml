server:
  port: 8001

spring:
  application:
    name: chrome-extension-backend
  
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/chrome_extension_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: WARN
    com.extension.backend: INFO
    com.baomidou.mybatisplus: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/application.log
    max-size: 10MB
    max-history: 10

# LLM API 配置
app:
  llm:
    api-key: ${LLM_API_KEY:sk-your-key}
    api-base: ${LLM_API_BASE:https://api.siliconflow.cn/v1}
    default-model: ${LLM_DEFAULT_MODEL:deepseek-ai/DeepSeek-V3.2}
    vision-model: ${LLM_VISION_MODEL:Qwen/Qwen3.5-35B-A3B}
    timeout: 60000

# 健康检查端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
