server:
  port: 8001

spring:
  application:
    name: chrome-extension-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/chrome_extension_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.extension.backend: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# LLM API 配置
app:
  llm:
    api-key: ${LLM_API_KEY:sk-your-key}
    api-base: ${LLM_API_BASE:https://api.siliconflow.cn/v1}
    default-model: ${LLM_DEFAULT_MODEL:Qwen/Qwen2.5-7B-Instruct}
    vision-model: ${LLM_VISION_MODEL:Qwen/Qwen2-VL-72B-Instruct}
    timeout: 60000
