version: '3.9'

services:
  # Spring Boot 应用服务
  backend:
    image: chrome-extension-backend:${APP_VERSION:-1.0.0}
    container_name: chrome-ext-backend
    hostname: backend
    restart: unless-stopped
    environment:
      # 数据库连接（使用宿主机MySQL）
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/chrome_extension_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      
      # LLM API 配置
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL}
      
      # 日志级别
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_COM_EXTENSION_BACKEND: INFO
      
      # Spring 配置
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    ports:
      # 映射应用端口：主机:容器
      - "${APP_PORT:-8001}:8001"
    
    volumes:
      # 应用日志持久化
      - ./logs:/var/log
      # 可选：存储上传的文件
      - ./uploads:/app/uploads
    
    networks:
      - app-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 限制资源使用（防止容器占用过多资源）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

# 声明自定义网络（容器间通信使用内网，不需暴露所有端口）
networks:
  app-network:
    driver: bridge
